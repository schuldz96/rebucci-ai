<script>
    document.addEventListener('DOMContentLoaded', function() {
        // Função para lidar com submit de qualquer formulário de login
        function handleLoginSubmit(form) {
            form.addEventListener('submit', function(e) {
                e.preventDefault();
                e.stopPropagation();

                const submitBtn = form.querySelector('.login-submit-btn, #login-submit-btn');
                const buttonText = form.querySelector('.login-button-text, #login-button-text');
                const loadingSpinner = form.querySelector('.login-loading-spinner, #login-loading-spinner');

                if (submitBtn && buttonText && loadingSpinner) {
                    submitBtn.disabled = true;
                    loadingSpinner.classList.remove('hidden');
                    buttonText.style.display = 'none';
                }

                form.submit();
            }, false);
        }

        // Aplicar para todos os formulários de login (mobile e desktop)
        const loginForms = document.querySelectorAll('form[action="/login"]');
        loginForms.forEach(function(form) {
            handleLoginSubmit(form);
        });

        // Toggle senha desktop
        const togglePassword = document.getElementById('toggle-password');
        if (togglePassword) {
            togglePassword.addEventListener('click', function() {
                const passwordInput = document.getElementById('user_password');
                const eyeClosed = document.getElementById('eye-closed');
                const eyeOpen = document.getElementById('eye-open');

                if (passwordInput && eyeClosed && eyeOpen) {
                    if (passwordInput.type === 'password') {
                        passwordInput.type = 'text';
                        eyeClosed.classList.add('hidden');
                        eyeOpen.classList.remove('hidden');
                    } else {
                        passwordInput.type = 'password';
                        eyeClosed.classList.remove('hidden');
                        eyeOpen.classList.add('hidden');
                    }
                }
            });
        }

        // Toggle senha mobile
        const togglePasswordBtns = document.querySelectorAll('.toggle-password-btn');
        togglePasswordBtns.forEach(function(btn) {
            btn.addEventListener('click', function() {
                const input = this.closest('.relative').querySelector('input');
                const eyeClosed = this.querySelector('.eye-closed');
                const eyeOpen = this.querySelector('.eye-open');

                if (input && eyeClosed && eyeOpen) {
                    if (input.type === 'password') {
                        input.type = 'text';
                        eyeClosed.classList.add('hidden');
                        eyeOpen.classList.remove('hidden');
                    } else {
                        input.type = 'password';
                        eyeClosed.classList.remove('hidden');
                        eyeOpen.classList.add('hidden');
                    }
                }
            });
        });
    });
